services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monifacturas}
      POSTGRES_USER: ${POSTGRES_USER:-moni}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-moni}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-moni}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-monifacturas}
    volumes:
      - ./guias-excel:/app/guias-excel:ro
      - ./backend:/app:rw

volumes:
  postgres_data:
